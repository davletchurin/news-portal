version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: postgres-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=news_portal_db
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d news_portal_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: test-news-portal:latest
    container_name: news-portal-app
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - HIBERNATE_DDL_AUTO=update
      - HIKARI_TIMEOUT=30000